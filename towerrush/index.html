<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Tower Rush Signal</title>
</head>
<body>

    <!-- Language selector -->
    <div class="language-selector">
        <img id="language-icon" src="../mines/flags/ru.png" alt="Language">
        <div id="language-dropdown">
            <img src="../mines/flags/ru.png" class="language-option" data-lang="ru">
            <img src="../mines/flags/en.png" class="language-option" data-lang="en">
            <img src="../mines/flags/hi.png" class="language-option" data-lang="hi">
            <img src="../mines/flags/pt.png" class="language-option" data-lang="pt">
            <img src="../mines/flags/es.png" class="language-option" data-lang="es">
            <img src="../mines/flags/tr.png" class="language-option" data-lang="tr">
        </div>
    </div>

    <!-- Logo -->
    <div class="logo-wrap">
        <div class="logo-text">Tower Rush</div>
        <div class="logo-sub">by Galaxsys · Signal</div>
    </div>

    <!-- Всё остальное — в flex-контейнере -->
    <div class="container">

        <!-- Статус -->
        <div id="status-wrap">
            <div id="status">— —</div>
            <div id="signal-accuracy">—</div>
        </div>

        <!-- Башня -->
        <div id="tower-outer">
            <div id="tower-inner">
                <div id="crane-wrap">
                    <img id="crane-img" src="../towerrush-assets/house.png" alt="crane">
                </div>
                <div id="floors"></div>
            </div>
        </div>

        <!-- Сложность -->
        <div class="diff-row">
            <button class="arr-btn" id="diff-prev">&#8249;</button>
            <span id="diff-label">MEDIUM</span>
            <button class="arr-btn" id="diff-next">&#8250;</button>
        </div>

        <!-- Кнопка сигнала -->
        <button id="flip">Получить сигнал</button>

        <!-- Прогресс + таймер -->
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
        <div id="countdown">Осталось: 0 сек</div>

    </div>

    <!-- Нижний таб -->
    <div class="tab">
        <button onclick="window.location.href='../index.html'">
            <img src="../mines/images/back.png" alt="Назад">
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
